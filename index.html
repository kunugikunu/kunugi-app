<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>㓛刀工業｜作業管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f1117;--steel:#1c2333;--iron:#2d3748;--slate:#4a5568;
  --mist:#a0aec0;--smoke:#e2e8f0;--white:#f8fafc;
  --accent:#f6a623;--accent2:#e85d04;--green:#22c55e;
  --red:#ef4444;--blue:#3b82f6;--purple:#a78bfa;
  --card:#161c2d;--border:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{min-height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--ink);color:var(--white);-webkit-text-size-adjust:100%;}
input,select,textarea,button{font-family:'Noto Sans JP',sans-serif;}
button{cursor:pointer;}
.mono{font-family:'DM Mono',monospace;}

/* ── SHELL ── */
.shell{display:flex;flex-direction:row;height:100vh;}
@media(max-width:768px){
  .shell{flex-direction:column;height:auto;min-height:100dvh;}
}

/* ── SIDEBAR（PC） ── */
.sidebar{width:220px;flex-shrink:0;background:var(--steel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.logo-mark{font-size:20px;font-weight:900;letter-spacing:-0.5px;}
.logo-mark span{color:var(--accent);}
.logo-sub{font-size:9px;color:var(--mist);letter-spacing:2px;margin-top:2px;font-family:'DM Mono',monospace;}
.nav-section{padding:16px 16px 4px;font-size:9px;letter-spacing:2px;color:var(--slate);font-family:'DM Mono',monospace;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:8px;margin:1px 8px;font-size:13px;font-weight:500;color:var(--mist);cursor:pointer;border:none;background:none;width:calc(100% - 16px);text-align:left;transition:all .15s;position:relative;}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--white);}
.nav-item.active{background:rgba(246,166,35,0.12);color:var(--accent);}
.nav-item.active::before{content:'';position:absolute;left:8px;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 2px 2px 0;}
.nav-icon{width:18px;text-align:center;font-size:15px;}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ink);flex-shrink:0;}
.av-mgr{background:linear-gradient(135deg,var(--accent),var(--accent2));}
.av-emp{background:linear-gradient(135deg,var(--blue),var(--purple));}
.user-name{font-size:12px;font-weight:600;}
.user-role{font-size:10px;color:var(--mist);}

/* ── ボトムナビ・モバイルヘッダー（デフォルト非表示） ── */
.bottom-nav{display:none;}
.mobile-header{display:none;}
@media(max-width:768px){
  .sidebar{display:none;}
  .bottom-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    background:var(--steel);
    border-top:1px solid var(--border);
    z-index:100;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .bottom-nav .nav-item{
    flex:1;flex-direction:column;gap:2px;
    padding:8px 4px;margin:0;border-radius:0;
    font-size:9px;white-space:nowrap;
    width:auto;
    border-top:2px solid transparent;
  }
  .bottom-nav .nav-item.active{background:rgba(246,166,35,0.1);border-top-color:var(--accent);}
  .bottom-nav .nav-item.active::before{display:none;}
  .bottom-nav .nav-icon{font-size:20px;width:auto;}
  .mobile-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));
    background:var(--steel);border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .mobile-header .logo-mark{font-size:16px;}
}

/* ── MAIN ── */
/* PC: mainがスクロール担当 */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow-y:auto;}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10;background:var(--ink);}
.page-title{font-size:17px;font-weight:700;}
.page-sub{font-size:11px;color:var(--mist);margin-top:1px;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.content{padding:20px 24px;display:flex;flex-direction:column;gap:16px;}
/* スマホ */
@media(max-width:768px){
  .main{overflow-y:auto;flex:1;padding-bottom:calc(64px + env(safe-area-inset-bottom));}
  .topbar{padding:12px 16px;}
  .content{padding:12px 14px 20px;gap:12px;}
}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.card-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;}
.badge{font-size:10px;padding:2px 9px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap;}
.badge-orange{background:rgba(246,166,35,.15);color:var(--accent);}
.badge-green{background:rgba(34,197,94,.15);color:var(--green);}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue);}
.badge-red{background:rgba(239,68,68,.15);color:var(--red);}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:768px){.kpi-row{grid-template-columns:1fr 1fr;gap:8px;}}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kpi-color,var(--accent));}
.kpi-label{font-size:9px;color:var(--mist);letter-spacing:1px;margin-bottom:6px;}
.kpi-value{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-1px;}
@media(max-width:768px){.kpi-value{font-size:16px;}}
.kpi-delta{font-size:10px;color:var(--mist);margin-top:4px;}
.up{color:var(--green)!important;}.down{color:var(--red)!important;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:8px 14px;text-align:left;font-size:9px;font-family:'DM Mono',monospace;letter-spacing:1.5px;color:var(--slate);border-bottom:1px solid var(--border);font-weight:400;white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--smoke);vertical-align:middle;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.tfoot td{border-top:1px solid var(--border);font-weight:700;color:var(--white);}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px;}
@media(max-width:768px){.form-grid{grid-template-columns:1fr;gap:12px;padding:14px;}}
.fg-full{grid-column:1/-1;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:2px;color:var(--mist);text-transform:uppercase;}
.form-input{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--white);font-size:14px;width:100%;outline:none;transition:border-color .15s;}
@media(max-width:768px){.form-input{font-size:16px;padding:11px 12px;}}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--slate);}
select.form-input option{background:var(--steel);}
.calc-box{background:rgba(246,166,35,0.08);border:1px solid rgba(246,166,35,0.2);border-radius:8px;padding:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.calc-item{text-align:center;}
.calc-val{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);}
.calc-lbl{font-size:9px;color:var(--mist);letter-spacing:1px;margin-top:1px;}
.submit-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-top:1px solid var(--border);flex-shrink:0;gap:12px;}
@media(max-width:768px){.submit-bar{padding:12px 14px;flex-direction:column;align-items:stretch;}}
.submit-info{font-size:11px;color:var(--mist);}
.btn-submit{padding:10px 24px;font-size:14px;font-weight:700;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--ink);}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;}
@media(max-width:768px){.btn-submit{width:100%;padding:14px;}}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:none;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--mist);}
.btn-ghost:hover{border-color:var(--mist);color:var(--white);}
.btn-accent{background:var(--accent);color:var(--ink);}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.btn-sm{padding:3px 9px;font-size:11px;}

/* ── TABS ── */
.tabs{display:flex;gap:2px;padding:0 24px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
@media(max-width:768px){.tabs{padding:0 14px;}}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--mist);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── SITE ROWS ── */
.site-row{padding:14px 18px;border-bottom:1px solid var(--border);}
.site-row:last-child{border-bottom:none;}
.site-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.site-name{font-size:13px;font-weight:600;}
.site-id{font-size:10px;color:var(--mist);font-family:'DM Mono',monospace;margin-left:6px;}
.profit-rate{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;}
.site-nums{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;font-size:11px;}
@media(max-width:768px){.site-nums{grid-template-columns:repeat(2,1fr);}}
.site-num-label{color:var(--mist);font-size:9px;margin-bottom:1px;}
.site-num-val{font-family:'DM Mono',monospace;font-weight:500;font-size:12px;}
.stacked{height:7px;border-radius:4px;background:rgba(255,255,255,.06);display:flex;overflow:hidden;margin-top:8px;}
.legend{display:flex;gap:14px;font-size:10px;color:var(--mist);flex-wrap:wrap;}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle;}
.prog-wrap{width:100%;background:rgba(255,255,255,.06);border-radius:4px;height:5px;margin-top:4px;}
.prog-bar{height:5px;border-radius:4px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:10px;font-weight:600;font-size:13px;z-index:999;animation:slideIn .3s ease;max-width:calc(100vw - 40px);}
@media(max-width:768px){.toast{bottom:80px;right:12px;left:12px;}}
.toast-success{background:var(--green);color:var(--ink);}
.toast-error{background:var(--red);color:var(--white);}
@keyframes slideIn{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 40%,rgba(246,166,35,.08),transparent 60%),var(--ink);}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;}
@media(max-width:480px){.login-box{padding:28px 20px;}}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .logo-mark{font-size:28px;}
.login-logo .logo-sub{margin-top:4px;}
.login-title{font-size:14px;font-weight:600;color:var(--mist);text-align:center;margin-bottom:24px;}
.login-form{display:flex;flex-direction:column;gap:14px;}
.login-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--ink);font-size:15px;font-weight:700;margin-top:4px;}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}
.login-hint{margin-top:20px;padding:14px;background:rgba(255,255,255,0.04);border-radius:10px;font-size:11px;color:var(--mist);}
.login-hint strong{color:var(--accent);}

/* ── MISC ── */
.empty{text-align:center;padding:36px;color:var(--slate);}
.empty-icon{font-size:32px;margin-bottom:8px;}
.loading{text-align:center;padding:36px;color:var(--mist);font-family:'DM Mono',monospace;}
.check-group{display:flex;gap:14px;flex-wrap:wrap;}
.check-label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:var(--smoke);}
.check-label input{accent-color:var(--accent);width:15px;height:15px;}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:5px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const fmt  = n => n==null?'—':'¥'+Math.round(n).toLocaleString();
const fmtTax = n => n==null?'—':'¥'+Math.round(n*1.1).toLocaleString(); // 税込(10%)
const fmtH = h => h==null?'—':h.toFixed(2)+'h';
const fmtP = p => p==null?'—':(p*100).toFixed(1)+'%';
const today= ()=>new Date().toISOString().slice(0,10);

// ── Toast ─────────────────────────────────────────────────────────────────
function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return <div className={`toast toast-${type}`}>{msg}</div>;
}

// ── Login ─────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [empId,setEmpId]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const submit=async()=>{
    if(!empId||!pw){setErr('IDとパスワードを入力してください');return;}
    setLoading(true);setErr('');
    try{
      const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({empId,password:pw})});
      const data=await res.json();
      if(data.error){setErr(data.error);return;}
      localStorage.setItem('kk_token',data.token);
      localStorage.setItem('kk_user',JSON.stringify({empId:data.empId,name:data.name,role:data.role}));
      onLogin(data);
    }catch(e){setErr('サーバーに接続できません');}
    finally{setLoading(false);}
  };
  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">
          <div className="logo-mark">㓛刀<span style={{color:'var(--accent)'}}>工業</span></div>
          <div style={{fontFamily:'DM Mono',fontSize:9,color:'var(--mist)',letterSpacing:'2px',marginTop:4}}>WORK MANAGEMENT SYSTEM</div>
        </div>
        <div className="login-title">ログイン</div>
        <div className="login-form">
          <div className="form-group"><label className="form-label">従業員ID</label>
            <input className="form-input" placeholder="例：E001" value={empId} onChange={e=>setEmpId(e.target.value.trim())} onKeyDown={e=>e.key==='Enter'&&submit()} autoComplete="username"/>
          </div>
          <div className="form-group"><label className="form-label">パスワード</label>
            <input className="form-input" type="password" placeholder="パスワードを入力" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} autoComplete="current-password"/>
          </div>
          {err&&<div style={{color:'var(--red)',fontSize:12,padding:'8px 12px',background:'rgba(239,68,68,.1)',borderRadius:8}}>{err}</div>}
          <button className="login-btn" onClick={submit} disabled={loading}>{loading?'ログイン中…':'ログイン →'}</button>
        </div>
        <div className="login-hint">
          <strong>初期ログイン情報</strong><br/>
          代表：MGR / admin1234<br/>
          田中：E001 / tanaka123<br/>
          山田：E002 / yamada123
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
const BASE="";
const api={
  get: (p,tk)    => fetch(`${BASE}/api${p}`,{headers:{Authorization:`Bearer ${tk}`}}).then(r=>r.json()),
  post:(p,b,tk)  => fetch(`${BASE}/api${p}`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${tk}`},body:JSON.stringify(b)}).then(r=>r.json()),
  put: (p,b,tk)  => fetch(`${BASE}/api${p}`,{method:'PUT', headers:{'Content-Type':'application/json',Authorization:`Bearer ${tk}`},body:JSON.stringify(b)}).then(r=>r.json()),
  del: (p,tk)    => fetch(`${BASE}/api${p}`,{method:'DELETE',headers:{Authorization:`Bearer ${tk}`}}).then(r=>r.json()),
};

function App(){
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('kk_user')||'null');}catch{return null;}});
  const [token,setToken]=useState(()=>localStorage.getItem('kk_token')||'');
  const [page,setPage]=useState('dashboard');
  const [data,setData]=useState({employees:[],sites:[],logs:[],subcons:[],extra_works:[],summary:[],salary:[]});
  const [loading,setLoading]=useState(false);
  const [toast,setToast]=useState(null);
  const showToast=(msg,type='success')=>setToast({msg,type});

  const reload=useCallback(async()=>{
    if(!token||!user)return;
    setLoading(true);
    try{
      const isMgr=user.role==='manager';
      const base=[api.get('/sites',token),api.get('/logs',token),api.get('/companies',token)];
      const mgr=isMgr?[api.get('/employees',token),api.get('/subcons',token),api.get('/extra_works',token),api.get('/summary',token)]:[];
      const [sites,logs,companies,...rest]=await Promise.all([...base,...mgr]);
      const [employees,subcons,extra_works,summary]=isMgr?rest:[[],[],[],[]];
      setData({
        employees:Array.isArray(employees)?employees:[],
        sites:Array.isArray(sites)?sites:[],
        logs:Array.isArray(logs)?logs:[],
        subcons:Array.isArray(subcons)?subcons:[],
        extra_works:Array.isArray(extra_works)?extra_works:[],
        summary:Array.isArray(summary)?summary:[],
        companies:Array.isArray(companies)?companies:[],
        salary:[],
      });
    }catch(e){showToast('データ取得エラー','error');}
    finally{setLoading(false);}
  },[token,user]);

  useEffect(()=>{if(user&&token)reload();},[user,token]);

  const logout=async()=>{
    await api.post('/logout',{},token);
    localStorage.removeItem('kk_token');localStorage.removeItem('kk_user');
    setUser(null);setToken('');setPage('dashboard');
  };
  const handleLogin=(d)=>{setUser({empId:d.empId,name:d.name,role:d.role});setToken(d.token);};

  if(!user||!token) return <Login onLogin={handleLogin}/>;

  const isMgr=user.role==='manager';
  const navItems=[
    {key:'dashboard',icon:'◈', label:'ダッシュボード',all:true},
    {key:'daily',    icon:'📋',label:'日報入力',       all:true},
    {key:'sites',    icon:'🏗', label:'現場集計',       mgr:true},
    {key:'salary',   icon:'💴',label:'給与',           mgr:true},
    {key:'subcon',   icon:'🔧',label:'外注',           mgr:true},
    {key:'master',   icon:'⚙', label:'設定',           mgr:true},
  ].filter(n=>n.all||(n.mgr&&isMgr));

  const totalRevenue=data.summary.reduce((s,x)=>s+(x.revenue||0),0);
  const totalProfit =data.summary.reduce((s,x)=>s+(x.profit||0),0);
  const totalMandays=data.summary.reduce((s,x)=>s+(x.total_mandays||0),0);

  return (
    <div className="shell">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">㓛刀<span style={{color:'var(--accent)'}}>工業</span></div>
          <div className="logo-sub">WORK MANAGEMENT</div>
        </div>
        <div className="nav-section">メニュー</div>
        {navItems.map(n=>(
          <button key={n.key} className={`nav-item${page===n.key?' active':''}`} onClick={()=>setPage(n.key)}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </button>
        ))}
        <div style={{padding:'8px 14px',fontSize:11,color:'var(--mist)'}}><span className="db-dot"></span>接続中</div>
        <div className="sidebar-footer">
          <div className={`avatar ${isMgr?'av-mgr':'av-emp'}`}>{user.name?.[0]||'？'}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="user-name" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
            <div className="user-role">{isMgr?'管理者':'従業員'}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={logout}>→</button>
        </div>
      </div>

      <div className="mobile-header">
        <div className="logo-mark">㓛刀<span style={{color:'var(--accent)'}}>工業</span></div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div className={`avatar ${isMgr?'av-mgr':'av-emp'}`} style={{width:26,height:26,fontSize:11}}>{user.name?.[0]||'？'}</div>
          <span style={{fontSize:12,color:'var(--mist)'}}>{user.name}</span>
          <button className="btn btn-ghost btn-sm" onClick={logout} style={{padding:'4px 8px',fontSize:11}}>ログアウト</button>
        </div>
      </div>

      <div className="main">
        {loading&&<div style={{height:2,background:'var(--accent)',flexShrink:0}}></div>}
        {page==='dashboard'&&<Dashboard data={data} totalRevenue={totalRevenue} totalProfit={totalProfit} totalMandays={totalMandays} isMgr={isMgr} setPage={setPage}/>}
        {page==='daily'    &&<DailyInput data={data} user={user} token={token} isMgr={isMgr} reload={reload} showToast={showToast}/>}
        {page==='sites'    &&<SitesPage data={data} token={token} reload={reload} showToast={showToast}/>}
        {page==='salary'   &&<SalaryPage data={data} user={user} isMgr={isMgr} token={token} showToast={showToast}/>}
        {page==='subcon'   &&<SubconPage data={data} token={token} reload={reload} showToast={showToast}/>}
        {page==='master'   &&<MasterPage data={data} token={token} reload={reload} showToast={showToast} user={user}/>}
      </div>

      <div className="bottom-nav">
        {navItems.map(n=>(
          <button key={n.key} className={`nav-item${page===n.key?' active':''}`} onClick={()=>setPage(n.key)}>
            <span className="nav-icon">{n.icon}</span><span>{n.label}</span>
          </button>
        ))}
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────
function Dashboard({data,totalRevenue,totalProfit,totalMandays,isMgr,setPage}){
  const now = new Date();
  const [rangeStart,setRangeStart]=useState(()=>{
    const d=new Date(now.getFullYear(), now.getMonth()-5, 1); // 5ヶ月前（当月含め6ヶ月）
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  });
  const [rangeEnd,setRangeEnd]=useState(()=>`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);

  // 月別集計（日報ベース、売上のみ）
  const monthlyData = useMemo(()=>{
    if(!data.summary||!data.logs) return [];
    const months=[];
    let cur=new Date(rangeStart+'-01');
    const end=new Date(rangeEnd+'-01');
    while(cur<=end){
      months.push(cur.toISOString().slice(0,7));
      cur=new Date(cur.getFullYear(), cur.getMonth()+1, 1);
    }
    return months.map(ym=>{
      const logs=data.logs.filter(l=>(l.date||'').startsWith(ym));
      const siteLogCounts={};
      logs.forEach(l=>{ siteLogCounts[l.site_id]=(siteLogCounts[l.site_id]||0)+1; });
      let revenue=0;
      Object.entries(siteLogCounts).forEach(([sid,cnt])=>{
        const s=data.summary.find(x=>x.id===sid);
        if(!s) return;
        const totalLogs=data.logs.filter(l=>l.site_id===sid).length;
        if(totalLogs>0) revenue+=Math.round((s.revenue||0)*cnt/totalLogs);
      });
      return {ym, label:ym.replace(/^\d{4}-/,'')+('月'), revenue};
    });
  },[data.logs,data.summary,rangeStart,rangeEnd]);

  const maxRevenue=Math.max(...monthlyData.map(d=>d.revenue),1);

  return (
    <>
      <div className="topbar">
        <div><div className="page-title">ダッシュボード</div><div className="page-sub">{now.getFullYear()}年{now.getMonth()+1}月</div></div>
        <button className="btn btn-accent" onClick={()=>setPage('daily')}>＋ 日報</button>
      </div>
      <div className="content">
        {isMgr&&<div className="kpi-row">
          <div className="kpi-card" style={{'--kpi-color':'var(--accent)'}}>
            <div className="kpi-label">売上合計（税抜）</div>
            <div className="kpi-value mono">{fmt(totalRevenue)}</div>
            <div className="kpi-delta" style={{fontFamily:'DM Mono,monospace'}}>税込 {fmtTax(totalRevenue)}</div>
          </div>
          <div className="kpi-card" style={{'--kpi-color':'var(--blue)'}}>
            <div className="kpi-label">総人工数（全現場）</div>
            <div className="kpi-value mono">{Math.round(totalMandays)}</div>
            <div className="kpi-delta">従業員+代表+外注 合計</div>
          </div>
          <div className="kpi-card" style={{'--kpi-color':'var(--purple)'}}>
            <div className="kpi-label">日報件数</div>
            <div className="kpi-value mono">{data.logs.length}</div>
            <div className="kpi-delta">本日 {data.logs.filter(l=>l.date===today()).length}件</div>
          </div>
        </div>}

        {/* 月別グラフ */}
        {isMgr&&<div className="card">
          <div className="card-header">
            <div className="card-title">月別推移</div>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <input type="month" className="form-input" style={{width:'auto',padding:'4px 8px',fontSize:12}}
                value={rangeStart} onChange={e=>setRangeStart(e.target.value)}/>
              <span style={{fontSize:12,color:'var(--mist)'}}>〜</span>
              <input type="month" className="form-input" style={{width:'auto',padding:'4px 8px',fontSize:12}}
                value={rangeEnd} onChange={e=>setRangeEnd(e.target.value)}/>
            </div>
          </div>
          <div style={{padding:'16px 18px'}}>
            {monthlyData.length===0
              ?<div className="empty"><div className="empty-icon">📊</div>期間を設定してください</div>
              :<>
                {/* 凡例 */}
                <div style={{display:'flex',gap:16,marginBottom:8,fontSize:11,color:'var(--mist)'}}>
                  <span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--accent)',marginRight:4}}></span>売上（税抜）</span>
                  <span style={{color:'var(--slate)'}}>当月は濃く表示</span>
                </div>
                {/* 棒グラフ（売上のみ） */}
                <div style={{display:'flex',alignItems:'flex-end',gap:6,height:180,overflowX:'auto',paddingTop:4}}>
                  {monthlyData.map((d,i)=>{
                    const barH = d.revenue>0 ? Math.max(4, Math.round(d.revenue/maxRevenue*130)) : 4;
                    const isCurrentMonth = d.ym===`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
                    return (
                      <div key={d.ym} style={{flex:'1 1 0',minWidth:36,display:'flex',flexDirection:'column',alignItems:'center'}}>
                        <div style={{fontSize:10,color:'var(--accent)',fontFamily:'DM Mono,monospace',marginBottom:3,whiteSpace:'nowrap'}}>
                          {d.revenue>0 ? Math.round(d.revenue/10000)+'万' : ''}
                        </div>
                        <div style={{flex:1,display:'flex',alignItems:'flex-end',width:'100%',paddingBottom:0}}>
                          <div style={{
                            width:'100%', borderRadius:'3px 3px 0 0',
                            background: isCurrentMonth ? 'var(--accent)' : 'rgba(246,166,35,0.45)',
                            height: barH+'px',
                            transition:'height 0.4s ease',
                          }} title={fmt(d.revenue)}></div>
                        </div>
                        <div style={{borderTop:'1px solid rgba(255,255,255,0.08)',width:'100%',marginTop:0}}></div>
                        <div style={{fontSize:11,color:isCurrentMonth?'var(--white)':'var(--mist)',marginTop:4,whiteSpace:'nowrap',fontWeight:isCurrentMonth?700:400}}>{d.label}</div>
                      </div>
                    );
                  })}
                </div>
              </>
            }
          </div>
        </div>}

        {isMgr&&<div className="card">
          <div className="card-header"><div className="card-title">現場別サマリー</div><span className="badge badge-orange">自動集計</span></div>
          <div className="table-wrap"><table>
            <thead><tr><th>現場</th><th>タイプ</th><th>売上（税抜）</th><th>税込売上</th><th>総人工</th><th>1人工売上（税抜）</th><th>税込</th><th>状況</th></tr></thead>
            <tbody>{data.summary.map(s=>(
              <tr key={s.id}>
                <td style={{fontWeight:500}}>{s.name}</td>
                <td><span className={`badge badge-${s.site_type==='応援'?'purple':'orange'}`}>{s.site_type||'請負'}</span></td>
                <td className="mono">{fmt(s.revenue)}</td>
                <td className="mono" style={{color:'var(--mist)',fontSize:11}}>{fmtTax(s.revenue)}</td>
                <td className="mono" style={{color:'var(--blue)'}}>{s.total_mandays||0}人工</td>
                <td className="mono" style={{color:'var(--accent)'}}>{fmt(s.revenue_per_manday)}</td>
                <td className="mono" style={{color:'var(--mist)',fontSize:11}}>{fmtTax(s.revenue_per_manday)}</td>
                <td><span className={`badge badge-${s.status==='進行中'?'orange':s.status==='完了'?'green':'blue'}`}>{s.status}</span></td>
              </tr>
            ))}</tbody>
          </table></div>
        </div>}
        <div className="card">
          <div className="card-header"><div className="card-title">最近の日報</div><span className="badge badge-blue">{data.logs.length}件</span></div>
          {data.logs.length===0?<div className="empty"><div className="empty-icon">📋</div>日報がありません</div>
          :<div className="table-wrap"><table>
            <thead><tr><th>日付</th><th>従業員</th><th>現場</th><th>残業</th><th>運転</th><th>移動</th></tr></thead>
            <tbody>{data.logs.slice(0,8).map(l=>(
              <tr key={l.id}>
                <td className="mono">{l.date}</td>
                <td>{l.emp_name||l.emp_id}</td>
                <td><span className="badge badge-orange">{l.site_id}</span></td>
                <td className="mono" style={{color:l.overtime_h>0?'var(--purple)':'var(--slate)'}}>{l.overtime_h>0?l.overtime_h+'h':'—'}</td>
                <td style={{fontSize:11,color:'var(--blue)'}}>{l.drive_type!=='なし'?`${l.drive_type} ${l.drive_type==='往復'?(l.drive_km||0)*2:(l.drive_km||0)}km`:'—'}</td>
                <td style={{fontSize:11,color:'var(--green)'}}>{(()=>{const mt=l.move_type||'なし';const mkm=mt==='往復'?(l.drive_km||0)*2:mt==='片道'?(l.drive_km||0):0;return mkm>0?`${mt} ${mkm}km`:'—';})()}</td>
              </tr>
            ))}</tbody>
          </table></div>}
        </div>
      </div>
    </>
  );
}

// ── DailyInput ────────────────────────────────────────────────────────────
// ── DailyInput ────────────────────────────────────────────────────────────
function DailyInput({data,user,token,isMgr,reload,showToast}){
  const empOpts = isMgr ? data.employees : [{id:user.empId,name:user.name}];
  const [form,setForm] = useState({
    date:today(), empId:user.empId, siteId:data.sites[0]?.id||'',
    overtime_h:'', drive_type:'なし', move_type:'なし', is_trip:false, memo:''
  });
  const [saving,setSaving] = useState(false);

  useEffect(()=>{
    if(data.sites.length&&!form.siteId) setForm(f=>({...f,siteId:data.sites[0].id}));
  },[data.sites]);

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  // 現場の片道km取得（sites テーブルから）
  const km = data.sites.find(s=>s.id===form.siteId)?.one_way_km || 0;
  // 運転手当: 片道/往復の場合のみ
  const drivenKm = form.drive_type==='往復' ? km*2 : form.drive_type==='片道' ? km : 0;
  // 移動手当: 片道=km×14円、往復=km×2×14円
  const moveKm   = form.move_type==='往復' ? km*2 : form.move_type==='片道' ? km : 0;
  const drivePay = Math.round(drivenKm * 4);
  const movePay  = Math.round(moveKm * 14);
  const otPay    = Math.round((parseFloat(form.overtime_h)||0) * 2100);
  const empInfo  = data.employees.find(e=>e.id===form.empId);
  const tripPay  = form.is_trip ? (empInfo?.trip_allowance||0) : 0;

  const submit = async()=>{
    if(!form.siteId){showToast('現場を選択してください','error');return;}
    setSaving(true);
    const res = await api.post('/logs',{
      ...form,
      overtime_h: parseFloat(form.overtime_h)||0,
      drive_km: km,
      move_type: form.move_type,
    },token);
    setSaving(false);
    if(res.error){showToast(res.error,'error');return;}
    showToast('日報を保存しました ✓');reload();
    setForm(f=>({...f,overtime_h:'',drive_type:'なし',move_type:'なし',is_trip:false,memo:''}));
  };
  const [logSearch,setLogSearch]=useState('');
  const [logSort,setLogSort]=useState('date_desc');

  const filteredLogs = useMemo(()=>{
    let logs=[...data.logs];
    // 検索フィルター
    if(logSearch.trim()){
      const q=logSearch.trim().toLowerCase();
      logs=logs.filter(l=>
        (l.date||'').includes(q) ||
        (l.emp_name||l.emp_id||'').toLowerCase().includes(q) ||
        (l.site_name||'').toLowerCase().includes(q) ||
        (l.site_id||'').toLowerCase().includes(q) ||
        (l.memo||'').toLowerCase().includes(q)
      );
    }
    // 並べ替え
    logs.sort((a,b)=>{
      if(logSort==='date_desc') return (b.date||'').localeCompare(a.date||'')||b.id-a.id;
      if(logSort==='date_asc')  return (a.date||'').localeCompare(b.date||'')||a.id-b.id;
      if(logSort==='name_asc')  return (a.emp_name||a.emp_id||'').localeCompare(b.emp_name||b.emp_id||'');
      if(logSort==='name_desc') return (b.emp_name||b.emp_id||'').localeCompare(a.emp_name||a.emp_id||'');
      if(logSort==='site_asc')  return (a.site_name||a.site_id||'').localeCompare(b.site_name||b.site_id||'');
      return 0;
    });
    return logs;
  },[data.logs,logSearch,logSort]);

  const del=async(id)=>{await api.del(`/logs/${id}`,token);showToast('削除しました');reload();};
  const [editLog,setEditLog]=useState(null);
  const [editSaving,setEditSaving]=useState(false);
  const openEdit=(l)=>setEditLog({id:l.id,date:l.date,empId:l.emp_id,siteId:l.site_id,overtime_h:l.overtime_h||0,drive_type:l.drive_type||'なし',is_trip:!!l.is_trip,move_type:l.move_type||'なし',memo:l.memo||''});
  const saveEdit=async()=>{
    setEditSaving(true);
    const res=await api.put(`/logs/${editLog.id}`,{date:editLog.date,emp_id:editLog.empId,site_id:editLog.siteId,overtime_h:parseFloat(editLog.overtime_h)||0,drive_type:editLog.drive_type,is_trip:editLog.is_trip?1:0,move_type:editLog.move_type||'なし',memo:editLog.memo},token);
    setEditSaving(false);
    if(res.error){showToast(res.error,'error');return;}
    showToast('日報を修正しました ✓');setEditLog(null);reload();
  };

  // 管理者として入力する対象が自分（MGR）かどうか
  const isInputtingMgr = form.empId === user.empId && user.role === 'manager';

  return (
    <>
      <div className="topbar">
        <div><div className="page-title">日報入力</div><div className="page-sub">1日1件 = 1人工 / 現場の距離は自動設定</div></div>
      </div>
      <div className="content">
        <div className="card">
          <div className="card-header"><div className="card-title">日報追加</div><span className="badge badge-orange">新規</span></div>
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">日付</label>
              <input type="date" className="form-input" value={form.date} onChange={e=>set('date',e.target.value)}/>
            </div>
            {isMgr && <div className="form-group">
              <label className="form-label">従業員</label>
              <select className="form-input" value={form.empId} onChange={e=>set('empId',e.target.value)}>
                {empOpts.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
              </select>
            </div>}
            <div className={`form-group${isMgr?'':' fg-full'}`}>
              <label className="form-label">現場</label>
              <select className="form-input" value={form.siteId} onChange={e=>set('siteId',e.target.value)}>
                {data.sites.map(s=><option key={s.id} value={s.id}>{s.id} — {s.name}</option>)}
              </select>
            </div>
            {/* 代表自身の日報はシンプル：メモのみ */}
            {isInputtingMgr ? <>
              <div className="form-group fg-full">
                <label className="form-label">メモ（任意）</label>
                <input type="text" className="form-input" placeholder="特記事項など" value={form.memo} onChange={e=>set('memo',e.target.value)}/>
              </div>
            </> : <>
              <div className="form-group">
                <label className="form-label">残業時間（h）</label>
                <input type="number" className="form-input" placeholder="0" min="0" step="0.5"
                  value={form.overtime_h} onChange={e=>set('overtime_h',e.target.value)}/>
              </div>
              <div className="form-group">
                <label className="form-label">
                  運転（運転手当 4円/km）
                  {km>0 && <span style={{marginLeft:6,fontSize:10,color:'var(--blue)',fontFamily:'DM Mono,monospace'}}>片道 {km}km</span>}
                  {km===0 && form.drive_type!=='なし' && <span style={{marginLeft:6,fontSize:10,color:'var(--accent)'}}>※現場に距離未設定</span>}
                </label>
                <select className="form-input" value={form.drive_type} onChange={e=>set('drive_type',e.target.value)}>
                  <option>なし</option><option>片道</option><option>往復</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">出張</label>
                <label style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',background:'rgba(255,255,255,0.03)',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer'}}>
                  <input type="checkbox" checked={form.is_trip} onChange={e=>set('is_trip',e.target.checked)}
                    style={{width:16,height:16,accentColor:'var(--accent)'}}/>
                  <span style={{fontSize:13}}>出張あり
                    {empInfo?.trip_allowance>0 && <span style={{marginLeft:6,fontSize:11,color:'var(--mist)',fontFamily:'DM Mono,monospace'}}>(+{(empInfo.trip_allowance).toLocaleString()}円)</span>}
                  </span>
                </label>
              </div>
              <div className="form-group">
                <label className="form-label">
                  移動（移動手当 14円/km）
                  {km>0 && <span style={{marginLeft:6,fontSize:10,color:'var(--green)',fontFamily:'DM Mono,monospace'}}>片道 {km}km</span>}
                </label>
                <select className="form-input" value={form.move_type} onChange={e=>set('move_type',e.target.value)}>
                  <option>なし</option><option>片道</option><option>往復</option>
                </select>
                {moveKm>0&&<div style={{fontSize:11,color:'var(--green)',marginTop:4,fontFamily:'DM Mono,monospace'}}>移動手当: {fmt(movePay)}（{moveKm}km × ¥14）</div>}
              </div>
              {(drivenKm>0||moveKm>0||otPay>0||tripPay>0) && <div className="form-group fg-full">
                <label className="form-label">手当プレビュー（{drivenKm>0?`運転${form.drive_type} ${drivenKm}km `:''}{moveKm>0?`移動${moveKm}km`:''}）</label>
                <div className="calc-box">
                  {otPay>0   && <div className="calc-item"><div className="calc-val" style={{color:'var(--purple)'}}>{fmt(otPay)}</div><div className="calc-lbl">時間外</div></div>}
                  {tripPay>0 && <div className="calc-item"><div className="calc-val" style={{color:'var(--accent)'}}>{fmt(tripPay)}</div><div className="calc-lbl">出張手当</div></div>}
                  {drivePay>0&& <div className="calc-item"><div className="calc-val" style={{color:'var(--blue)'}}>{fmt(drivePay)}</div><div className="calc-lbl">運転手当</div></div>}
                  {movePay>0 && <div className="calc-item"><div className="calc-val" style={{color:'var(--green)'}}>{fmt(movePay)}</div><div className="calc-lbl">移動手当</div></div>}
                </div>
              </div>}
              <div className="form-group fg-full">
                <label className="form-label">メモ（任意）</label>
                <input type="text" className="form-input" placeholder="特記事項など" value={form.memo} onChange={e=>set('memo',e.target.value)}/>
              </div>
            </>}
          </div>
          <div className="submit-bar">
            <div className="submit-info">{isInputtingMgr?'代表の出勤記録（人工にカウント・給与計算なし）':'現場の距離は「設定→現場」から変更できます'}</div>
            <button className="btn-submit" onClick={submit} disabled={saving}>{saving?'保存中…':'日報を送信 →'}</button>
          </div>
        </div>

        <div className="card">
          <div className="card-header"><div className="card-title">日報一覧</div><span className="badge badge-blue">{data.logs.length}件</span></div>
          {/* 検索・並べ替えバー */}
          <div style={{padding:'10px 18px',display:'flex',gap:8,flexWrap:'wrap',borderBottom:'1px solid var(--border)'}}>
            <input className="form-input" style={{flex:'1 1 160px',minWidth:120}}
              placeholder="氏名・現場名・日付で検索…"
              value={logSearch} onChange={e=>setLogSearch(e.target.value)}/>
            <select className="form-input" style={{width:'auto'}} value={logSort} onChange={e=>setLogSort(e.target.value)}>
              <option value="date_desc">日付（新しい順）</option>
              <option value="date_asc">日付（古い順）</option>
              <option value="name_asc">氏名（昇順）</option>

function SalaryPage({data,user,isMgr,token,showToast}){
  const now = new Date();
  const [year,  setYear]  = useState(String(now.getFullYear()));
  const [month, setMonth] = useState(String(now.getMonth()+1).padStart(2,'0'));
  const [viewMode,setViewMode] = useState('month'); // 'month' | 'year'
  const [salary, setSalary]    = useState([]);
  const [detail, setDetail]    = useState(null); // {emp, logs, salary} 給与明細表示用
  const [loading2, setLoading2]= useState(false);

  const years = [];
  for(let y=now.getFullYear(); y>=now.getFullYear()-3; y--) years.push(String(y));
  const months = Array.from({length:12},(_,i)=>String(i+1).padStart(2,'0'));

  const fetchSalary = async()=>{
    setLoading2(true);
    const qs = viewMode==='month'
      ? `?year=${year}&month=${month}`
      : `?year=${year}`;
    const res = await api.get(`/salary${qs}`,token);
    setSalary(Array.isArray(res)?res:[]);
    setLoading2(false);
  };

  useEffect(()=>{fetchSalary();},[year,month,viewMode,token]);

  const fetchDetail = async(empId)=>{
    const qs = viewMode==='month'
      ? `?emp_id=${empId}&year=${year}&month=${month}`
      : `?emp_id=${empId}&year=${year}`;
    const res = await api.get(`/salary_detail${qs}`,token);
    if(res.error){showToast(res.error,'error');return;}
    // クライアントで給与計算
    const e = res.emp;
    const logs = res.logs;
    const days = logs.length;
    const base_pay  = days * e.daily_wage;
    const ot_h = logs.reduce((s,l)=>s+(l.overtime_h||0),0);
    const ot_pay = Math.round(ot_h*2100);
    const trip_days = logs.filter(l=>l.is_trip).length;
    const trip_pay  = trip_days * (e.trip_allowance||0);
    let drive_pay=0,move_pay=0,total_km=0;
    logs.forEach(l=>{
      const km=l.drive_km||0, dt=l.drive_type||'なし';
      const akm=dt==='往復'?km*2:dt==='片道'?km:0;
      total_km+=akm;
      drive_pay+=Math.round(akm*4);
      move_pay +=Math.round(akm*14);
    });
    const total_pay = base_pay+ot_pay+trip_pay+drive_pay+move_pay;
    setDetail({emp:e, logs, days, base_pay, ot_h:Math.round(ot_h*10)/10, ot_pay,
      trip_days, trip_pay, drive_pay, move_pay, total_km:Math.round(total_km), total_pay});
  };

  const printSlip = ()=>{
    if(!detail) return;
    const d=detail; const e=d.emp;
    const label = viewMode==='month' ? `${year}年${parseInt(month)}月` : `${year}年`;
    const win = window.open('','_blank','width=700,height=900');
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>給与明細 ${e.name} ${label}</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box;}
      body{font-family:'Noto Sans JP',sans-serif;font-size:13px;color:#111;padding:24px;}
      h2{text-align:center;font-size:16px;margin-bottom:16px;border-bottom:2px solid #222;padding-bottom:8px;}
      .header{display:flex;justify-content:space-between;margin-bottom:16px;font-size:12px;}
      .company{line-height:1.7;}
      .person{text-align:right;line-height:1.7;}
      .section{font-weight:700;background:#f0f0f0;padding:4px 8px;margin:12px 0 4px;font-size:12px;}
      table{width:100%;border-collapse:collapse;margin-bottom:12px;}

function SubconPage({data,token,reload,showToast}){
  const [form,setForm]=useState({date:today(),vendor:'',siteId:data.sites[0]?.id||'',qty:1,unit:'人工',price:'',status:'未払'});
  const [saving,setSaving]=useState(false);
  useEffect(()=>{if(data.sites.length&&!form.siteId)setForm(f=>({...f,siteId:data.sites[0].id}));},[data.sites]);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const submit=async()=>{
    if(!form.vendor||!form.price){showToast('外注先と金額を入力してください','error');return;}
    setSaving(true);const res=await api.post('/subcons',{...form,qty:+form.qty,price:+form.price},token);setSaving(false);
    if(res.error){showToast(res.error,'error');return;}
    showToast('外注情報を保存しました ✓');reload();setForm(f=>({...f,vendor:'',qty:1,price:''}));
  };
  const del=async(id)=>{await api.del(`/subcons/${id}`,token);showToast('削除しました');reload();};
  const toggle=async(id,st)=>{await api.put(`/subcons/${id}`,{status:st==='未払'?'支払済':'未払'},token);reload();};

  const total=data.subcons.reduce((s,x)=>s+x.qty*x.price,0);
  const totalMd=data.subcons.reduce((s,x)=>s+x.qty,0);

  return (
    <>
      <div className="topbar"><div><div className="page-title">外注管理</div><div className="page-sub">外注人工は現場集計の人工数に合算されます</div></div></div>
      <div className="content">
        <div className="card">
          <div className="card-header"><div className="card-title">外注追加</div></div>
          <div className="form-grid">
            <div className="form-group"><label className="form-label">日付</label><input type="date" className="form-input" value={form.date} onChange={e=>set('date',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">外注先</label>
              <div style={{display:'flex',gap:6}}>
                <input className="form-input" placeholder="A社" value={form.vendor} onChange={e=>set('vendor',e.target.value)}/>
                {(data.companies||[]).length>0&&<select className="form-input" style={{width:'auto',minWidth:120}}
                  onChange={e=>{if(e.target.value)set('vendor',e.target.value);e.target.value='';}}>
                  <option value="">取引先から選択</option>
                  {(data.companies||[]).map(cp=><option key={cp.id} value={cp.name}>{cp.name}</option>)}
                </select>}
              </div>
            </div>
            <div className="form-group fg-full"><label className="form-label">現場</label>
              <select className="form-input" value={form.siteId} onChange={e=>set('siteId',e.target.value)}>
                {data.sites.map(s=><option key={s.id} value={s.id}>{s.id} — {s.name}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">数量</label><input type="number" className="form-input" value={form.qty} onChange={e=>set('qty',e.target.value)} min="0.5" step="0.5"/></div>
            <div className="form-group"><label className="form-label">単位</label>
              <select className="form-input" value={form.unit} onChange={e=>set('unit',e.target.value)}>
                {['人工','一式','m','m²','個','式'].map(u=><option key={u}>{u}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">単価（円）</label><input type="number" className="form-input" placeholder="0" value={form.price} onChange={e=>set('price',e.target.value)}/></div>
            <div className="form-group">
              <label className="form-label">金額（自動）</label>
              <div style={{padding:'9px 12px',background:'rgba(255,255,255,0.03)',borderRadius:8,border:'1px solid var(--border)',fontFamily:'DM Mono,monospace',color:'var(--green)'}}>
                {form.qty&&form.price?fmt(+form.qty*+form.price):'—'}
              </div>
            </div>
          </div>
          <div className="submit-bar">
            <span className="submit-info">外注合計: <strong style={{color:'var(--accent)',fontFamily:'DM Mono,monospace'}}>{fmt(total)}</strong>　総人工: <strong style={{color:'var(--purple)',fontFamily:'DM Mono,monospace'}}>{totalMd}人工</strong></span>
            <button className="btn-submit" onClick={submit} disabled={saving}>{saving?'保存中…':'追加 ＋'}</button>
          </div>
        </div>
        <div className="card">
          <div className="card-header"><div className="card-title">外注一覧</div><span className="badge badge-orange">{data.subcons.length}件</span></div>
          {data.subcons.length===0?<div className="empty"><div className="empty-icon">🔧</div>外注情報がありません</div>
          :<div className="table-wrap"><table>
            <thead><tr><th>日付</th><th>外注先</th><th>現場</th><th>数量</th><th>金額</th><th>状況</th><th></th></tr></thead>
            <tbody>{data.subcons.map(s=>(
              <tr key={s.id}>
                <td className="mono">{s.date}</td><td style={{fontWeight:500}}>{s.vendor}</td>
                <td><span className="badge badge-orange">{s.site_id}</span></td>
                <td className="mono">{s.qty}{s.unit}</td>
                <td className="mono">{fmt(s.qty*s.price)}</td>
                <td><button className={`badge ${s.status==='支払済'?'badge-green':'badge-red'}`} style={{border:'none',cursor:'pointer'}} onClick={()=>toggle(s.id,s.status)}>{s.status}</button></td>
                <td><button className="btn btn-danger btn-sm" onClick={()=>del(s.id)}>削除</button></td>
              </tr>
            ))}</tbody>
          </table></div>}
        </div>
      </div>
    </>
  );
}

function MasterPage({data,token,reload,showToast,user}){

  const addSite=async()=>{
    if(!sf.id||!sf.name){showToast('IDと現場名を入力してください','error');return;}
    setSaving(true);const res=await api.post('/sites',{...sf,contract:+sf.contract||0,manday_price:+sf.manday_price||0,one_way_km:+sf.one_way_km||0,support_company_id:sf.support_company_id||null,note:sf.note||''},token);setSaving(false);
    if(res.error){showToast(res.error,'error');return;}

    setSf({id:'',name:'',client:'',site_type:'請負',contract:'',manday_price:'',one_way_km:'',support_company_id:'',note:'',start_date:'',end_date:'',status:'進行中'});
  };
  const delSite=async(id)=>{await api.del(`/sites/${id}`,token);showToast('削除しました');reload();};
  const [editSiteMaster,setEditSiteMaster]=useState(null); // {id, new_id, name, ...}
  const saveEditSiteMaster=async()=>{
    if(!editSiteMaster.name){showToast('現場名を入力してください','error');return;}
    setSaving(true);
    const newId = (editSiteMaster.new_id||'').trim();
    if(!newId){showToast('IDを入力してください','error');return;}
    const res=await api.put(`/sites/${editSiteMaster.id}`,{
      new_id: newId,
      name:editSiteMaster.name, client:editSiteMaster.client||'',
      site_type:editSiteMaster.site_type,
      contract:+editSiteMaster.contract||0, manday_price:+editSiteMaster.manday_price||0,
      one_way_km:+editSiteMaster.one_way_km||0,

                </select>
              </div>
              <div className="form-group"><label className="form-label">新しい日給（円）</label>
                <input type="number" className="form-input" placeholder="変更しない場合は空欄" value={wageEdit.wage} onChange={e=>setWageEdit(f=>({...f,wage:e.target.value}))}/>
              </div>
              <div className="form-group"><label className="form-label">出張手当（円/日）</label>
                <input type="number" className="form-input" placeholder="変更しない場合は空欄" value={wageEdit.trip} onChange={e=>setWageEdit(f=>({...f,trip:e.target.value}))}/>
              </div>
            </div>
            <div className="submit-bar"><span></span><button className="btn-submit" onClick={changeWage}>変更する</button></div>
          </div>
        </>}

        {/* パスワードタブ */}
        {tab==='pw'&&<>
          <div className="card">
            <div className="card-header"><div className="card-title">パスワード変更</div></div>
            <div className="form-grid">
              <div className="form-group"><label className="form-label">対象従業員</label>
                <select className="form-input" value={pwChange.empId} onChange={e=>setPwChange(f=>({...f,empId:e.target.value}))}>
                  <option value="">選択してください</option>
                  {data.employees.map(e=><option key={e.id} value={e.id}>{e.name}（{e.id}）</option>)}
                </select>
              </div>
              <div className="form-group"><label className="form-label">新しいパスワード</label>
                <input type="text" className="form-input" placeholder="新しいパスワード" value={pwChange.newPw} onChange={e=>setPwChange(f=>({...f,newPw:e.target.value}))}/>
              </div>
            </div>
            <div className="submit-bar">
              <span className="submit-info">変更後は本人に直接お伝えください</span>
              <button className="btn-submit" onClick={changePw}>パスワードを変更する</button>
            </div>
          </div>
        </>}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
