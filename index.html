<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>㓛刀工業｜作業管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f1117;--steel:#1c2333;--iron:#2d3748;--slate:#4a5568;
  --mist:#a0aec0;--smoke:#e2e8f0;--white:#f8fafc;
  --accent:#f6a623;--accent2:#e85d04;--green:#22c55e;
  --red:#ef4444;--blue:#3b82f6;--purple:#a78bfa;
  --card:#161c2d;--border:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--ink);color:var(--white);}
input,select,textarea,button{font-family:'Noto Sans JP',sans-serif;}
button{cursor:pointer;}
.mono{font-family:'DM Mono',monospace;}

/* ── SHELL ── */
.shell{display:grid;grid-template-columns:220px 1fr;height:100vh;}
@media(max-width:768px){.shell{grid-template-columns:1fr;grid-template-rows:auto 1fr;height:100dvh;}}

/* ── SIDEBAR ── */
.sidebar{background:var(--steel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
@media(max-width:768px){
  .sidebar{flex-direction:row;border-right:none;border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;padding:0 8px;}
  .sidebar-logo,.nav-section,.sidebar-footer,.mode-switch{display:none;}
}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.logo-mark{font-size:20px;font-weight:900;letter-spacing:-0.5px;}
.logo-mark span{color:var(--accent);}
.logo-sub{font-size:9px;color:var(--mist);letter-spacing:2px;margin-top:2px;font-family:'DM Mono',monospace;}
.nav-section{padding:16px 16px 4px;font-size:9px;letter-spacing:2px;color:var(--slate);font-family:'DM Mono',monospace;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:8px;margin:1px 8px;font-size:13px;font-weight:500;color:var(--mist);cursor:pointer;border:none;background:none;width:calc(100%-16px);text-align:left;transition:all .15s;position:relative;}
@media(max-width:768px){
  .nav-item{flex-direction:column;gap:2px;padding:8px 10px;margin:0;border-radius:0;font-size:10px;white-space:nowrap;min-width:64px;border-bottom:2px solid transparent;width:auto;}
  .nav-item.active{background:none;border-bottom-color:var(--accent);}
  .nav-item.active::before{display:none;}
  .nav-icon{font-size:18px;}
}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--white);}
.nav-item.active{background:rgba(246,166,35,0.12);color:var(--accent);}
.nav-item.active::before{content:'';position:absolute;left:8px;top:20%;bottom:20%;width:3px;background:var(--accent);border-radius:0 2px 2px 0;}
.nav-icon{width:18px;text-align:center;font-size:15px;}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ink);flex-shrink:0;}
.av-mgr{background:linear-gradient(135deg,var(--accent),var(--accent2));}
.av-emp{background:linear-gradient(135deg,var(--blue),var(--purple));}
.user-name{font-size:12px;font-weight:600;}
.user-role{font-size:10px;color:var(--mist);}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden;}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
@media(max-width:768px){.topbar{padding:12px 16px;}}
.page-title{font-size:17px;font-weight:700;}
.page-sub{font-size:11px;color:var(--mist);margin-top:1px;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.content{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;}
@media(max-width:768px){.content{padding:12px 14px;gap:12px;}}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--iron);border-radius:2px;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.card-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;}
.badge{font-size:10px;padding:2px 9px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap;}
.badge-orange{background:rgba(246,166,35,.15);color:var(--accent);}
.badge-green{background:rgba(34,197,94,.15);color:var(--green);}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue);}
.badge-red{background:rgba(239,68,68,.15);color:var(--red);}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:768px){.kpi-row{grid-template-columns:1fr 1fr;gap:8px;}}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kpi-color,var(--accent));}
.kpi-label{font-size:9px;color:var(--mist);letter-spacing:1px;margin-bottom:6px;}
.kpi-value{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-1px;}
@media(max-width:768px){.kpi-value{font-size:16px;}}
.kpi-delta{font-size:10px;color:var(--mist);margin-top:4px;}
.up{color:var(--green)!important;}.down{color:var(--red)!important;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:8px 14px;text-align:left;font-size:9px;font-family:'DM Mono',monospace;letter-spacing:1.5px;color:var(--slate);border-bottom:1px solid var(--border);font-weight:400;white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--smoke);vertical-align:middle;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.tfoot td{border-top:1px solid var(--border);font-weight:700;color:var(--white);}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px;}
@media(max-width:768px){.form-grid{grid-template-columns:1fr;gap:12px;padding:14px;}}
.fg-full{grid-column:1/-1;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:2px;color:var(--mist);text-transform:uppercase;}
.form-input{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--white);font-size:14px;width:100%;outline:none;transition:border-color .15s;}
@media(max-width:768px){.form-input{font-size:16px;padding:11px 12px;}}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--slate);}
select.form-input option{background:var(--steel);}
.calc-box{background:rgba(246,166,35,0.08);border:1px solid rgba(246,166,35,0.2);border-radius:8px;padding:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.calc-item{text-align:center;}
.calc-val{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);}
.calc-lbl{font-size:9px;color:var(--mist);letter-spacing:1px;margin-top:1px;}
.submit-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-top:1px solid var(--border);flex-shrink:0;gap:12px;}
@media(max-width:768px){.submit-bar{padding:12px 14px;flex-direction:column;align-items:stretch;}}
.submit-info{font-size:11px;color:var(--mist);}
.btn-submit{padding:10px 24px;font-size:14px;font-weight:700;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--ink);}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;}
@media(max-width:768px){.btn-submit{width:100%;padding:14px;}}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:none;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--mist);}
.btn-ghost:hover{border-color:var(--mist);color:var(--white);}
.btn-accent{background:var(--accent);color:var(--ink);}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.btn-sm{padding:3px 9px;font-size:11px;}

/* ── TABS ── */
.tabs{display:flex;gap:2px;padding:0 24px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
@media(max-width:768px){.tabs{padding:0 14px;}}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--mist);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── SITE ROWS ── */
.site-row{padding:14px 18px;border-bottom:1px solid var(--border);}
.site-row:last-child{border-bottom:none;}
.site-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.site-name{font-size:13px;font-weight:600;}
.site-id{font-size:10px;color:var(--mist);font-family:'DM Mono',monospace;margin-left:6px;}
.profit-rate{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;}
.site-nums{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;font-size:11px;}
@media(max-width:768px){.site-nums{grid-template-columns:repeat(2,1fr);}}
.site-num-label{color:var(--mist);font-size:9px;margin-bottom:1px;}
.site-num-val{font-family:'DM Mono',monospace;font-weight:500;font-size:12px;}
.stacked{height:7px;border-radius:4px;background:rgba(255,255,255,.06);display:flex;overflow:hidden;margin-top:8px;}
.legend{display:flex;gap:14px;font-size:10px;color:var(--mist);flex-wrap:wrap;}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle;}
.prog-wrap{width:100%;background:rgba(255,255,255,.06);border-radius:4px;height:5px;margin-top:4px;}
.prog-bar{height:5px;border-radius:4px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:10px;font-weight:600;font-size:13px;z-index:999;animation:slideIn .3s ease;max-width:calc(100vw - 40px);}
@media(max-width:768px){.toast{bottom:80px;right:12px;left:12px;}}
.toast-success{background:var(--green);color:var(--ink);}
.toast-error{background:var(--red);color:var(--white);}
@keyframes slideIn{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 40%,rgba(246,166,35,.08),transparent 60%),var(--ink);}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;}
@media(max-width:480px){.login-box{padding:28px 20px;}}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .logo-mark{font-size:28px;}
.login-logo .logo-sub{margin-top:4px;}
.login-title{font-size:14px;font-weight:600;color:var(--mist);text-align:center;margin-bottom:24px;}
.login-form{display:flex;flex-direction:column;gap:14px;}
.login-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--ink);font-size:15px;font-weight:700;margin-top:4px;}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}
.login-hint{margin-top:20px;padding:14px;background:rgba(255,255,255,0.04);border-radius:10px;font-size:11px;color:var(--mist);}
.login-hint strong{color:var(--accent);}

/* ── MISC ── */
.empty{text-align:center;padding:36px;color:var(--slate);}
.empty-icon{font-size:32px;margin-bottom:8px;}
.loading{text-align:center;padding:36px;color:var(--mist);font-family:'DM Mono',monospace;}
.check-group{display:flex;gap:14px;flex-wrap:wrap;}
.check-label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:var(--smoke);}
.check-label input{accent-color:var(--accent);width:15px;height:15px;}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:5px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const BASE = "";  // same origin（Railway では不要）
const api = {
  get:  (p,tk)   => fetch(`${BASE}/api${p}`,{headers:{Authorization:`Bearer ${tk}`}}).then(r=>r.json()),
  post: (p,b,tk) => fetch(`${BASE}/api${p}`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${tk}`},body:JSON.stringify(b)}).then(r=>r.json()),
  put:  (p,b,tk) => fetch(`${BASE}/api${p}`,{method:'PUT',headers:{'Content-Type':'application/json',Authorization:`Bearer ${tk}`},body:JSON.stringify(b)}).then(r=>r.json()),
  del:  (p,tk)   => fetch(`${BASE}/api${p}`,{method:'DELETE',headers:{Authorization:`Bearer ${tk}`}}).then(r=>r.json()),
};

const calcH = (s,e,r)=>{if(!s||!e)return{actual:0,overtime:0};const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);const ac=Math.max(0,(eh*60+em-sh*60-sm-r)/60);return{actual:ac,overtime:Math.max(0,ac-8)};};
const fmt  = n => n==null?'—':'¥'+Math.round(n).toLocaleString();
const fmtH = h => h==null?'—':h.toFixed(2)+'h';
const fmtP = p => p==null?'—':(p*100).toFixed(1)+'%';
const today= ()=>new Date().toISOString().slice(0,10);

// ── Toast ─────────────────────────────────────────────────────────────────
function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return <div className={`toast toast-${type}`}>{msg}</div>;
}

// ── Login ─────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const [empId,setEmpId]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const submit=async()=>{
    if(!empId||!pw){setErr('IDとパスワードを入力してください');return;}
    setLoading(true);setErr('');
    try{
      const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({empId,password:pw})});
      const data=await res.json();
      if(data.error){setErr(data.error);return;}
      localStorage.setItem('kk_token',data.token);
      localStorage.setItem('kk_user',JSON.stringify({empId:data.empId,name:data.name,role:data.role}));
      onLogin(data);
    }catch(e){setErr('サーバーに接続できません');}
    finally{setLoading(false);}
  };

  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">
          <div className="logo-mark">㓛刀<span style={{color:'var(--accent)'}}>工業</span></div>
          <div className="logo-sub" style={{fontFamily:'DM Mono',fontSize:9,color:'var(--mist)',letterSpacing:'2px',marginTop:4}}>WORK MANAGEMENT SYSTEM</div>
        </div>
        <div className="login-title">ログイン</div>
        <div className="login-form">
          <div className="form-group">
            <label className="form-label">従業員ID</label>
            <input className="form-input" placeholder="例：E001" value={empId} onChange={e=>setEmpId(e.target.value.trim())} onKeyDown={e=>e.key==='Enter'&&submit()} autoComplete="username" />
          </div>
          <div className="form-group">
            <label className="form-label">パスワード</label>
            <input className="form-input" type="password" placeholder="パスワードを入力" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} autoComplete="current-password" />
          </div>
          {err && <div style={{color:'var(--red)',fontSize:12,padding:'8px 12px',background:'rgba(239,68,68,.1)',borderRadius:8}}>{err}</div>}
          <button className="login-btn" onClick={submit} disabled={loading}>{loading?'ログイン中…':'ログイン →'}</button>
        </div>
        <div className="login-hint">
          <strong>初期ログイン情報</strong><br/>
          代表：MGR / admin1234<br/>
          田中：E001 / tanaka123<br/>
          山田：E002 / yamada123<br/>
          <span style={{fontSize:10,marginTop:4,display:'block'}}>※ マスタ設定でパスワードを変更できます</span>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('kk_user')||'null');}catch{return null;}
  });
  const [token,setToken]=useState(()=>localStorage.getItem('kk_token')||'');
  const [page,setPage]=useState('dashboard');
  const [data,setData]=useState({employees:[],sites:[],logs:[],expenses:[],subcons:[],summary:[],salary:[]});
  const [loading,setLoading]=useState(false);
  const [toast,setToast]=useState(null);

  const showToast=(msg,type='success')=>setToast({msg,type});

  const reload=useCallback(async()=>{
    if(!token||!user)return;
    setLoading(true);
    try{
      const isMgr=user.role==='manager';
      const base=[api.get('/sites',token),api.get('/logs',token)];
      const mgr=isMgr?[api.get('/employees',token),api.get('/expenses',token),api.get('/subcons',token),api.get('/summary',token),api.get('/salary',token)]:[];
      const [sites,logs,...rest]=await Promise.all([...base,...mgr]);
      const [employees,expenses,subcons,summary,salary]=isMgr?rest:[[],[],[],[],[]];
      setData({
        employees:Array.isArray(employees)?employees:[],
        sites:Array.isArray(sites)?sites:[],
        logs:Array.isArray(logs)?logs:[],
        expenses:Array.isArray(expenses)?expenses:[],
        subcons:Array.isArray(subcons)?subcons:[],
        summary:Array.isArray(summary)?summary:[],
        salary:Array.isArray(salary)?salary:[],
      });
    }catch(e){showToast('データ取得エラー','error');}
    finally{setLoading(false);}
  },[token,user]);

  useEffect(()=>{if(user&&token)reload();},[user,token]);

  const logout=async()=>{
    await api.post('/logout',{},token);
    localStorage.removeItem('kk_token');localStorage.removeItem('kk_user');
    setUser(null);setToken('');setPage('dashboard');
  };

  const handleLogin=(data)=>{setUser({empId:data.empId,name:data.name,role:data.role});setToken(data.token);};

  if(!user||!token) return <Login onLogin={handleLogin}/>;

  const isMgr=user.role==='manager';
  const navItems=[
    {key:'dashboard',icon:'◈',label:'ダッシュボード',all:true},
    {key:'daily',icon:'📋',label:'日報入力',all:true},
    {key:'sites',icon:'🏗',label:'現場集計',mgr:true},
    {key:'salary',icon:'💴',label:'給与',mgr:true},
    {key:'expense',icon:'🧾',label:'経費',mgr:true},
    {key:'subcon',icon:'🔧',label:'外注',mgr:true},
    {key:'master',icon:'⚙',label:'設定',mgr:true},
  ].filter(n=>n.all||(n.mgr&&isMgr));

  const totalSales =data.summary.reduce((s,x)=>s+x.contract,0);
  const totalProfit=data.summary.reduce((s,x)=>s+x.profit,0);
  const totalLabor =data.summary.reduce((s,x)=>s+(x.labor_cost||0),0);

  return (
    <div className="shell">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">㓛刀<span style={{color:'var(--accent)'}}>工業</span></div>
          <div className="logo-sub">WORK MANAGEMENT</div>
        </div>
        <div className="nav-section">メニュー</div>
        {navItems.map(n=>(
          <button key={n.key} className={`nav-item${page===n.key?' active':''}`} onClick={()=>setPage(n.key)}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </button>
        ))}
        <div style={{padding:'8px 14px',fontSize:11,color:'var(--mist)'}}>
          <span className="db-dot"></span>接続中
        </div>
        <div className="sidebar-footer">
          <div className={`avatar ${isMgr?'av-mgr':'av-emp'}`}>{user.name?.[0]||'？'}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="user-name" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
            <div className="user-role">{isMgr?'管理者':'従業員'}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={logout} title="ログアウト">→</button>
        </div>
      </div>

      <div className="main">
        {loading && <div style={{height:2,background:'var(--accent)',animation:'none'}}></div>}
        {page==='dashboard'&&<Dashboard data={data} totalSales={totalSales} totalProfit={totalProfit} totalLabor={totalLabor} isMgr={isMgr} setPage={setPage}/>}
        {page==='daily'    &&<DailyInput data={data} user={user} token={token} isMgr={isMgr} reload={reload} showToast={showToast}/>}
        {page==='sites'    &&<SitesPage data={data}/>}
        {page==='salary'   &&<SalaryPage data={data}/>}
        {page==='expense'  &&<ExpensePage data={data} token={token} reload={reload} showToast={showToast}/>}
        {page==='subcon'   &&<SubconPage data={data} token={token} reload={reload} showToast={showToast}/>}
        {page==='master'   &&<MasterPage data={data} token={token} reload={reload} showToast={showToast} user={user}/>}
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ── Daily Input ───────────────────────────────────────────────────────────
function DailyInput({data,user,token,isMgr,reload,showToast}){
  const empOpts=isMgr?data.employees.filter(e=>e.type==='従業員'):[{id:user.empId,name:user.name}];
  const [form,setForm]=useState({date:today(),empId:user.empId,siteId:data.sites[0]?.id||'',start:'08:00',end:'17:00',rest:60,allowances:[],memo:''});
  const [saving,setSaving]=useState(false);
  useEffect(()=>{if(data.sites.length&&!form.siteId)setForm(f=>({...f,siteId:data.sites[0].id}));},[data.sites]);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggle=(a)=>setForm(f=>({...f,allowances:f.allowances.includes(a)?f.allowances.filter(x=>x!==a):[...f.allowances,a]}));
  const {actual,overtime}=calcH(form.start,form.end,+form.rest);
  const emp=data.employees.find(e=>e.id===form.empId)||{hourly:0};
  const wage=Math.round(Math.min(actual,8)*emp.hourly+overtime*emp.hourly*1.25);

  const submit=async()=>{
    if(!form.siteId||!form.start||!form.end){showToast('必須項目を入力してください','error');return;}
    setSaving(true);
    const res=await api.post('/logs',form,token);
    setSaving(false);
    if(res.error){showToast(res.error,'error');return;}
    showToast('日報を保存しました ✓');
    reload();
    setForm(f=>({...f,start:'08:00',end:'17:00',rest:60,allowances:[],memo:''}));
  };

  const del=async(id)=>{await api.del(`/logs/${id}`,token);showToast('削除しました');reload();};

  return (
    <>
      <div className="topbar"><div><div className="page-title">日報入力</div><div className="page-sub">データはDBに保存されます</div></div></div>
      <div className="content">
        <div className="card">
          <div className="card-header"><div className="card-title">日報追加</div><span className="badge badge-orange">新規</span></div>
          <div className="form-grid">
            <div className="form-group"><label className="form-label">日付</label><input type="date" className="form-input" value={form.date} onChange={e=>set('date',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">従業員</label>
              <select className="form-input" value={form.empId} onChange={e=>set('empId',e.target.value)} disabled={!isMgr}>
                {empOpts.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
              </select>
            </div>
            <div className="form-group fg-full"><label className="form-label">現場</label>
              <select className="form-input" value={form.siteId} onChange={e=>set('siteId',e.target.value)}>
                {data.sites.map(s=><option key={s.id} value={s.id}>{s.id} — {s.name}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">開始</label><input type="time" className="form-input" value={form.start} onChange={e=>set('start',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">終了</label><input type="time" className="form-input" value={form.end} onChange={e=>set('end',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">休憩（分）</label><input type="number" className="form-input" value={form.rest} onChange={e=>set('rest',e.target.value)} min="0" step="15"/></div>
            <div className="form-group">
              <label className="form-label">自動計算</label>
              <div className="calc-box">
                <div className="calc-item"><div className="calc-val">{fmtH(actual)}</div><div className="calc-lbl">実働</div></div>
                <div className="calc-item"><div className="calc-val" style={{color:overtime>0?'var(--purple)':'var(--mist)'}}>{fmtH(overtime)}</div><div className="calc-lbl">残業</div></div>
                <div className="calc-item"><div className="calc-val" style={{color:'var(--green)'}}>{fmt(wage)}</div><div className="calc-lbl">労務費</div></div>
              </div>
            </div>
            <div className="form-group fg-full"><label className="form-label">手当</label>
              <div className="check-group">{['出張手当','夜間手当','休日出勤'].map(a=>(
                <label key={a} className="check-label"><input type="checkbox" checked={form.allowances.includes(a)} onChange={()=>toggle(a)}/>{a}</label>
              ))}</div>
            </div>
            <div className="form-group fg-full"><label className="form-label">メモ</label><input type="text" className="form-input" placeholder="任意" value={form.memo} onChange={e=>set('memo',e.target.value)}/></div>
          </div>
          <div className="submit-bar">
            <div className="submit-info">✅ SQLiteに永続保存されます</div>
            <button className="btn-submit" onClick={submit} disabled={saving}>{saving?'保存中…':'日報を送信 →'}</button>
          </div>
        </div>
        <div className="card">
          <div className="card-header"><div className="card-title">日報一覧</div><span className="badge badge-blue">{data.logs.length}件</span></div>
          {data.logs.length===0?<div className="empty"><div className="empty-icon">📋</div>日報がありません</div>
          :<div className="table-wrap"><table>
            <thead><tr><th>日付</th><th>従業員</th><th>現場</th><th>開始</th><th>終了</th><th>実働</th><th>残業</th><th>労務費</th><th></th></tr></thead>
            <tbody>{data.logs.map(l=>{
              const {actual,overtime}=calcH(l.start_time,l.end_time,l.rest_min);
              const w=l.hourly?Math.round(Math.min(actual,8)*l.hourly+overtime*l.hourly*1.25):0;
              return <tr key={l.id}>
                <td className="mono">{l.date}</td><td>{l.emp_name||l.emp_id}</td>
                <td><span className="badge badge-orange">{l.site_id}</span></td>
                <td className="mono">{l.start_time}</td><td className="mono">{l.end_time}</td>
                <td className="mono" style={{color:'var(--green)'}}>{fmtH(actual)}</td>
                <td className="mono" style={{color:overtime>0?'var(--purple)':'var(--slate)'}}>{overtime>0?fmtH(overtime):'—'}</td>
                <td className="mono">{fmt(w)}</td>
                <td><button className="btn btn-danger btn-sm" onClick={()=>del(l.id)}>削除</button></td>
              </tr>;
            })}</tbody>
          </table></div>}
        </div>
      </div>
    </>
  );
}

// ── Subcon ────────────────────────────────────────────────────────────────
function SubconPage({data,token,reload,showToast}){
  const [form,setForm]=useState({date:today(),vendor:'',siteId:data.sites[0]?.id||'',work:'',qty:1,unit:'人工',price:'',status:'未払'});
  const [saving,setSaving]=useState(false);
  useEffect(()=>{if(data.sites.length&&!form.siteId)setForm(f=>({...f,siteId:data.sites[0].id}));},[data.sites]);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const submit=async()=>{
    if(!form.vendor||!form.price||!form.work){showToast('必須項目を入力してください','error');return;}
    setSaving(true);const res=await api.post('/subcons',{...form,qty:+form.qty,price:+form.price},token);setSaving(false);
    if(res.error){showToast(res.error,'error');return;}
    showToast('外注情報を保存しました ✓');reload();setForm(f=>({...f,vendor:'',work:'',qty:1,price:''}));
  };
  const del=async(id)=>{await api.del(`/subcons/${id}`,token);showToast('削除しました');reload();};
  const toggle=async(id,st)=>{await api.put(`/subcons/${id}`,{status:st==='未払'?'支払済':'未払'},token);reload();};
  const total=data.subcons.reduce((s,x)=>s+x.qty*x.price,0);
  return (
    <>
      <div className="topbar"><div><div className="page-title">外注管理</div><div className="page-sub">外注先・支払状況</div></div></div>
      <div className="content">
        <div className="card">
          <div className="card-header"><div className="card-title">外注追加</div></div>
          <div className="form-grid">
            <div className="form-group"><label className="form-label">日付</label><input type="date" className="form-input" value={form.date} onChange={e=>set('date',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">外注先</label><input type="text" className="form-input" placeholder="A社" value={form.vendor} onChange={e=>set('vendor',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">現場</label>
              <select className="form-input" value={form.siteId} onChange={e=>set('siteId',e.target.value)}>
                {data.sites.map(s=><option key={s.id} value={s.id}>{s.id} — {s.name}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">作業内容</label><input type="text" className="form-input" placeholder="型枠工事" value={form.work} onChange={e=>set('work',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">数量</label><input type="number" className="form-input" value={form.qty} onChange={e=>set('qty',e.target.value)} min="1"/></div>
            <div className="form-group"><label className="form-label">単位</label>
              <select className="form-input" value={form.unit} onChange={e=>set('unit',e.target.value)}>
                {['人工','一式','m','m²','個','式'].map(u=><option key={u}>{u}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">単価（円）</label><input type="number" className="form-input" placeholder="0" value={form.price} onChange={e=>set('price',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">金額（自動）</label>
              <div style={{padding:'9px 12px',background:'rgba(255,255,255,0.03)',borderRadius:8,border:'1px solid var(--border)',fontFamily:'DM Mono,monospace',color:'var(--green)'}}>
                {form.qty&&form.price?fmt(+form.qty * +form.price):'—'}
              </div>
            </div>
          </div>
          <div className="submit-bar">
            <span className="submit-info">外注合計: <strong style={{color:'var(--accent)',fontFamily:'DM Mono,monospace'}}>{fmt(total)}</strong></span>
            <button className="btn-submit" onClick={submit} disabled={saving}>{saving?'保存中…':'追加 ＋'}</button>
          </div>
        </div>
        <div className="card">
          <div className="card-header"><div className="card-title">外注一覧</div><span className="badge badge-orange">{data.subcons.length}件</span></div>
          {data.subcons.length===0?<div className="empty"><div className="empty-icon">🔧</div>外注情報がありません</div>
          :<div className="table-wrap"><table>
            <thead><tr><th>日付</th><th>外注先</th><th>現場</th><th>作業</th><th>数量</th><th>金額</th><th>状況</th><th></th></tr></thead>
            <tbody>{data.subcons.map(s=>(
              <tr key={s.id}>
                <td className="mono">{s.date}</td><td style={{fontWeight:500}}>{s.vendor}</td>
                <td><span className="badge badge-orange">{s.site_id}</span></td>
                <td style={{color:'var(--mist)'}}>{s.work}</td><td className="mono">{s.qty}{s.unit}</td>
                <td className="mono">{fmt(s.qty*s.price)}</td>
                <td><button className={`badge ${s.status==='支払済'?'badge-green':'badge-red'}`} style={{border:'none',cursor:'pointer'}} onClick={()=>toggle(s.id,s.status)}>{s.status}</button></td>
                <td><button className="btn btn-danger btn-sm" onClick={()=>del(s.id)}>削除</button></td>
              </tr>
            ))}</tbody>
          </table></div>}
        </div>
      </div>
    </>
  );
}

// ── Master ────────────────────────────────────────────────────────────────
function MasterPage({data,token,reload,showToast,user}){
  const [tab,setTab]=useState('emp');
  const [ef,setEf]=useState({id:'',name:'',type:'従業員',hourly:1800,allowance:0,password:'',role:'employee'});
  const [sf,setSf]=useState({id:'',name:'',client:'',contract:'',budget:'',status:'進行中'});
  const [pwChange,setPwChange]=useState({empId:'',newPw:''});
  const [saving,setSaving]=useState(false);

  const addEmp=async()=>{
    if(!ef.id||!ef.name||!ef.password){showToast('ID・氏名・パスワードを入力してください','error');return;}
    setSaving(true);const res=await api.post('/employees',ef,token);setSaving(false);
    if(res.error){showToast(res.error,'error');return;}
    showToast('従業員を追加しました ✓');reload();setEf({id:'',name:'',type:'従業員',hourly:1800,allowance:0,password:'',role:'employee'});
  };
  const delEmp=async(id)=>{await api.del(`/employees/${id}`,token);showToast('削除しました');reload();};
  const addSite=async()=>{
    if(!sf.id||!sf.name){showToast('IDと現場名を入力してください','error');return;}
    setSaving(true);const res=await api.post('/sites',{...sf,contract:+sf.contract,budget:+sf.budget},token);setSaving(false);
    if(res.error){showToast(res.error,'error');return;}
    showToast('現場を追加しました ✓');reload();setSf({id:'',name:'',client:'',contract:'',budget:'',status:'進行中'});
  };
  const delSite=async(id)=>{await api.del(`/sites/${id}`,token);showToast('削除しました');reload();};
  const changePw=async()=>{
    if(!pwChange.empId||!pwChange.newPw){showToast('対象と新しいパスワードを入力してください','error');return;}
    const res=await api.put(`/employees/${pwChange.empId}`,{password:pwChange.newPw},token);
    if(res.error){showToast(res.error,'error');return;}
    showToast('パスワードを変更しました ✓');setPwChange({empId:'',newPw:''});
  };

  return (
    <>
      <div className="topbar"><div><div className="page-title">マスタ設定</div><div className="page-sub">従業員・現場・パスワード管理</div></div></div>
      <div className="tabs">
        <button className={`tab${tab==='emp'?' active':''}`} onClick={()=>setTab('emp')}>従業員</button>
        <button className={`tab${tab==='site'?' active':''}`} onClick={()=>setTab('site')}>現場</button>
        <button className={`tab${tab==='pw'?' active':''}`} onClick={()=>setTab('pw')}>パスワード変更</button>
      </div>
      <div className="content">
        {tab==='emp'&&<>
          <div className="card">
            <div className="card-header"><div className="card-title">従業員追加</div></div>
            <div className="form-grid">
              <div className="form-group"><label className="form-label">ID（例：E003）</label><input className="form-input" placeholder="E003" value={ef.id} onChange={e=>setEf(f=>({...f,id:e.target.value}))}/></div>
              <div className="form-group"><label className="form-label">氏名</label><input className="form-input" placeholder="鈴木 一郎" value={ef.name} onChange={e=>setEf(f=>({...f,name:e.target.value}))}/></div>
              <div className="form-group"><label className="form-label">区分</label>
                <select className="form-input" value={ef.type} onChange={e=>setEf(f=>({...f,type:e.target.value}))}>
                  <option>従業員</option><option>外注</option>
                </select>
              </div>
              <div className="form-group"><label className="form-label">権限</label>
                <select className="form-input" value={ef.role} onChange={e=>setEf(f=>({...f,role:e.target.value}))}>
                  <option value="employee">従業員（日報のみ）</option>
                  <option value="manager">代表（全機能）</option>
                </select>
              </div>
              <div className="form-group"><label className="form-label">時給（円）</label><input type="number" className="form-input" value={ef.hourly} onChange={e=>setEf(f=>({...f,hourly:e.target.value}))}/></div>
              <div className="form-group"><label className="form-label">初期パスワード</label><input type="text" className="form-input" placeholder="password1234" value={ef.password} onChange={e=>setEf(f=>({...f,password:e.target.value}))}/></div>
            </div>
            <div className="submit-bar"><span></span><button className="btn-submit" onClick={addEmp} disabled={saving}>{saving?'保存中…':'追加 ＋'}</button></div>
          </div>
          <div className="card">
            <div className="card-header"><div className="card-title">従業員一覧</div></div>
            <div className="table-wrap"><table>
              <thead><tr><th>ID</th><th>氏名</th><th>区分</th><th>権限</th><th>時給</th><th></th></tr></thead>
              <tbody>{data.employees.map(e=>(
                <tr key={e.id}>
                  <td className="mono">{e.id}</td><td>{e.name}</td>
                  <td><span className={`badge badge-${e.type==='従業員'?'blue':'orange'}`}>{e.type}</span></td>
                  <td><span className={`badge badge-${e.role==='manager'?'orange':'blue'}`}>{e.role==='manager'?'代表':'従業員'}</span></td>
                  <td className="mono">{fmt(e.hourly)}</td>
                  <td>{e.id!==user.empId&&<button className="btn btn-danger btn-sm" onClick={()=>delEmp(e.id)}>削除</button>}</td>
                </tr>
              ))}</tbody>
            </table></div>
          </div>
        </>}
        {tab==='site'&&<>
          <div className="card">
            <div className="card-header"><div className="card-title">現場追加</div></div>
            <div className="form-grid">
              <div className="form-group"><label className="form-label">案件ID（例：S005）</label><input className="form-input" placeholder="S005" value={sf.id} onChange={e=>setSf(f=>({...f,id:e.target.value}))}/></div>
              <div className="form-group"><label className="form-label">現場名</label><input className="form-input" placeholder="〇〇工事" value={sf.name} onChange={e=>setSf(f=>({...f,name:e.target.value}))}/></div>
              <div className="form-group"><label className="form-label">元請</label><input className="form-input" placeholder="〇〇建設" value={sf.client} onChange={e=>setSf(f=>({...f,client:e.target.value}))}/></div>
              <div className="form-group"><label className="form-label">契約金額（円）</label><input type="number" className="form-input" value={sf.contract} onChange={e=>setSf(f=>({...f,contract:e.target.value}))}/></div>
              <div className="form-group"><label className="form-label">予算原価（円）</label><input type="number" className="form-input" value={sf.budget} onChange={e=>setSf(f=>({...f,budget:e.target.value}))}/></div>
              <div className="form-group"><label className="form-label">状況</label>
                <select className="form-input" value={sf.status} onChange={e=>setSf(f=>({...f,status:e.target.value}))}>
                  <option>準備中</option><option>進行中</option><option>完了</option>
                </select>
              </div>
            </div>
            <div className="submit-bar"><span></span><button className="btn-submit" onClick={addSite} disabled={saving}>{saving?'保存中…':'追加 ＋'}</button></div>
          </div>
          <div className="card">
            <div className="card-header"><div className="card-title">現場一覧</div></div>
            <div className="table-wrap"><table>
              <thead><tr><th>ID</th><th>現場名</th><th>元請</th><th>契約金額</th><th>状況</th><th></th></tr></thead>
              <tbody>{data.sites.map(s=>(
                <tr key={s.id}>
                  <td className="mono">{s.id}</td><td>{s.name}</td><td style={{color:'var(--mist)'}}>{s.client}</td>
                  <td className="mono">{fmt(s.contract)}</td>
                  <td><span className={`badge badge-${s.status==='進行中'?'orange':s.status==='完了'?'green':'blue'}`}>{s.status}</span></td>
                  <td><button className="btn btn-danger btn-sm" onClick={()=>delSite(s.id)}>削除</button></td>
                </tr>
              ))}</tbody>
            </table></div>
          </div>
        </>}
        {tab==='pw'&&<>
          <div className="card">
            <div className="card-header"><div className="card-title">パスワード変更</div></div>
            <div className="form-grid">
              <div className="form-group"><label className="form-label">対象従業員</label>
                <select className="form-input" value={pwChange.empId} onChange={e=>setPwChange(f=>({...f,empId:e.target.value}))}>
                  <option value="">選択してください</option>
                  {data.employees.map(e=><option key={e.id} value={e.id}>{e.name}（{e.id}）</option>)}
                </select>
              </div>
              <div className="form-group"><label className="form-label">新しいパスワード</label>
                <input type="text" className="form-input" placeholder="新しいパスワード" value={pwChange.newPw} onChange={e=>setPwChange(f=>({...f,newPw:e.target.value}))}/>
              </div>
            </div>
            <div className="submit-bar">
              <span className="submit-info">変更後は本人に直接お伝えください</span>
              <button className="btn-submit" onClick={changePw}>パスワードを変更する</button>
            </div>
          </div>
          <div className="card" style={{padding:20}}>
            <div style={{fontSize:13,color:'var(--mist)',lineHeight:1.8}}>
              <strong style={{color:'var(--white)'}}>ログイン情報の管理について</strong><br/>
              ・パスワードはSHA-256でハッシュ化してDBに保存されます<br/>
              ・忘れた場合は代表（管理者）がここから再設定できます<br/>
              ・従業員は自分のIDでログインし、自分の日報のみ閲覧・入力できます
            </div>
          </div>
        </>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
